services:
  - type: web
    name: library-backend-api
    env: node
    region: oregon
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 1d
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_REFRESH_EXPIRE
        value: 7d
      - key: BCRYPT_SALT_ROUNDS
        value: "10"
      - key: FRONTEND_URL
        value: https://YOUR_VERCEL_APP.vercel.app
      - key: MAX_LOGIN_ATTEMPTS
        value: "5"
      - key: LOCKOUT_DURATION
        value: "15"
      - key: OTP_EXPIRY
        value: "5"
      - key: DATABASE_URL
        fromDatabase:
          name: library_ozone
          property: connectionString

databases:
  - name: library_ozone
    plan: free
    databaseName: library_ozone
    user: library_admin